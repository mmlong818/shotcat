{{ $scenarios := site.Data.homepage.scenarios }}
<section class="jf-section">
  <div class="jf-heading">
    <div class="jf-kicker">Use Cases</div>
    <h2>适合什么场景</h2>
    <p class="jf-lead">Jellyfish 不是单个模型的演示页，而是为短剧和视频内容生产设计的工作台。</p>
  </div>
  <div class="jf-scenario-grid">
    {{ range $scenarios }}
      <div class="jf-scenario jf-card">
        <div class="jf-panel-kicker">{{ .eyebrow }}</div>
        <h3>{{ .title }}</h3>
        <p class="jf-card-copy">{{ .description }}</p>
      </div>
    {{ end }}
  </div>
</section>
