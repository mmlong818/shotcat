{{ $features := site.Data.homepage.features }}
<section class="jf-section">
  <div class="jf-heading">
    <div class="jf-kicker">Capabilities</div>
    <h2>核心能力</h2>
    <p class="jf-lead">围绕 AI 短剧生产最关键的几个痛点，优先建设一致性、流程化和可控性。</p>
  </div>
  <div class="jf-feature-grid">
    {{ range $features }}
      <div class="jf-feature jf-card">
        <h3>{{ .title }}</h3>
        <p class="jf-card-copy">{{ .description }}</p>
      </div>
    {{ end }}
  </div>
</section>
