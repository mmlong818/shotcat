server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  # Ensure runtime env is not cached aggressively
  location = /env.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

